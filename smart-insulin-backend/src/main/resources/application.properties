spring.application.name=smart-insulin-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smart-insulin-db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1111}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.jpa.properties.hibernate.flyway.ignore_missing_migrations=true

jwt.secret=${JWT_SECRET:your-256-bit-secret-key-must-be-very-long-and-secure}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000
